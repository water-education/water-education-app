<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Chlorhuhn - Simulación</title>
  </head>
  <body>
    <button id="start-simulation" style="display: none;"></button>

    <div id="mainContainer" class="container">
        <div class="row">
            <div class="col"></div>
            <div class="col-4">
                <div class="card login-card" id="login-card">
                    <div class="card-body" id="login-card-body">
                        <div class="page-header">
                            <h1 class="text-white">Chlorhuhn</h1>
                        </div>
                        <h6 class="card-subtitle mb-2 text-white top-buffer">MODO SIMULACIÓN</h6>
                        <div id="login-form">
                            <p class="text-white">Cargando simulador de agua...</p>
                            <div class="btn-group">
                                <button id="login" class="btn btn-outline-light">Conectar</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
    
    <script src="jquery.min.js"></script>
    <script src="game.js"></script>
  </body>
</html>
