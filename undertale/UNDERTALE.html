<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0">
    <title>UNDERTALE</title>
    
    <link rel="icon" type="image/x-icon" href="https://undertale.win/play/fav.ico">
    <link rel="stylesheet" href="./UNDERTALE_files/ut.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        body { background-color: #000; color: #fff; margin: 0; overflow: hidden; font-family: sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        canvas { border: 0 none; background-color: #000; width: 100%; height: auto; max-width: 640px; image-rendering: pixelated; }
        .loading { position: absolute; text-align: center; z-index: 10; }
        .spinner { border: 4px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top: 4px solid #fff; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #output-container { position: fixed; bottom: 10px; left: 10px; z-index: 20; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; border: 2px solid #333; }
        .output-button { background: #222; color: white; border: 1px solid #444; padding: 6px 12px; cursor: pointer; margin: 2px; font-size: 11px; text-transform: uppercase; font-weight: bold; }
        .output-button:hover { background: #444; border-color: #888; }
    </style>
</head>

<body oncontextmenu="return false;">

    <div id="game-container">
        <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
        
        <div class="loading" id="loading-ui">
            <div class="spinner"></div>
            <div id="status">Loading Soul...</div>
        </div>
    </div>

    <div class="output-container" id="output-container">
        <button class="output-button" onclick="toggleFullscreen()">Fullscreen</button>
        <button class="output-button" onclick="toggleFPS()">FPS Counter</button>
        <button class="output-button" onclick="toggleWASD(this)">WASD: OFF</button>
        <button class="output-button" onclick="window.location.reload()">Restart</button>
        <input id="colorpicker" type="color" onchange="document.body.style.backgroundColor = this.value" style="vertical-align: middle;">
    </div>

    <script>
        // --- ENGINE CONFIG (The piece that was missing) ---
        var Module = {
            preRun: [],
            postRun: [],
            canvas: document.getElementById('canvas'),
            setStatus: function(text) {
                document.getElementById('status').innerHTML = text;
                if (!text) document.getElementById('loading-ui').style.display = 'none';
            }
        };

        // --- BUTTON LOGIC ---
        let mirroringEnabled = false;
        const mapping = { "w": "ArrowUp", "a": "ArrowLeft", "s": "ArrowDown", "d": "ArrowRight" };

        window.toggleWASD = function(btn) {
            mirroringEnabled = !mirroringEnabled;
            btn.innerText = mirroringEnabled ? "WASD: ON" : "WASD: OFF";
            btn.style.color = mirroringEnabled ? "#ffff00" : "#fff";
        };

        window.addEventListener("keydown", (e) => {
            if (mirroringEnabled && mapping[e.key.toLowerCase()]) {
                document.dispatchEvent(new KeyboardEvent("keydown", { key: mapping[e.key.toLowerCase()], bubbles: true }));
            }
        }, true);

        window.addEventListener("keyup", (e) => {
            if (mirroringEnabled && mapping[e.key.toLowerCase()]) {
                document.dispatchEvent(new KeyboardEvent("keyup", { key: mapping[e.key.toLowerCase()], bubbles: true }));
            }
        }, true);

        function toggleFPS() { if (typeof showStat !== 'undefined') showStat = !showStat; }
        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }
    </script>

    <script defer src="./UNDERTALE_files/v8c78df7c7c0f484497ecbca7046644da1771523124516"></script>
</body>
</html>
