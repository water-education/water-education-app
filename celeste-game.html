<!doctype html>
<html>

<head>
    <!-- FIX: disable cache (prevents Chromebook crash on reload) -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- KEEP CDN (since yours worked first load) -->
    <base href="https://cdn.jsdelivr.net/gh/web-ports/celeste@4f043a5ce121b74dc54ce56d74f213a2eeea6b4e/">

    <title>CelesteWasm</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/x-icon" href="assets/app.ico" />
    <link rel="prefetch" href="assets/mountain.png">
    <link rel="stylesheet" href="styles.css" />

    <!-- Google Analytics (safe) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-L7856P3VNT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-L7856P3VNT');
    </script>

    <!-- FIX: prevent broken cache reuse -->
    <script>
      var Module = {
        locateFile: (path) => path
      };

      // wipe broken IndexedDB cache (important for Chromebook)
      if (window.indexedDB) {
        indexedDB.deleteDatabase('/idbfs');
      }
    </script>

    <!-- FIX: cache-busting -->
    <script src="cfg.js"></script>
    <script src="data.js?v="></script>
    <script type="module" src="bundle.js"></script>

</head>

<body>
    <div id="loading-textt" style="color: black; font-size: 48px; font-family: cursive; text-align: center; margin-top: 20px;">
        LOADING DOT.NET...
    </div>

    <!-- FORCE reload of data.js every time -->
    <script>
      document.querySelector('script[src^="data.js"]').src =
        "data.js?v=" + Date.now();
    </script>

</body>

</html>
