<!DOCTYPE html>
<html>
<head>
    <base href="https://cdn.jsdelivr.net/gh/web-ports/celeste@4f043a5ce121b74dc54ce56d74f213a2eeea6b4e/">
    <title>Celeste - Steam Fixed</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <link rel="icon" type="image/x-icon" href="assets/app.ico" />
    <link rel="stylesheet" href="styles.css" />

    <style>
        body { background-color: #050505; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #fff; font-family: sans-serif; }
        #loading-textt { font-size: 20px; color: #4ca3ff; margin-bottom: 10px; }
        #progress-container { width: 300px; height: 6px; background: #222; border-radius: 3px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: #4ca3ff; transition: width 0.2s; }
        #diag { margin-top: 15px; font-size: 11px; color: #666; font-family: monospace; }
        .danger { color: #ff4444; font-weight: bold; }
    </style>

    <script>
        let totalBytes = 0;
        const MAX_ALLOWED_MB = 40; // Si pasa de 40MB en una Chromebook, algo anda mal

        window.Module = {
            initialMemory: 33554432,
            allowMemoryGrowth: true,
            setStatus: function(text) {
                const status = document.getElementById('status-msg');
                if (text.includes("Initializing")) {
                    status.innerText = "INICIANDO MOTOR STEAM...";
                } else if (text) {
                    status.innerText = text;
                }
            }
        };

        // INTERCEPTOR ANTI-BUCLE (Corrige el error de los 600MB)
        const originalFetch = window.fetch;
        window.fetch = async (...args) => {
            const url = args[0].toString();
            // Si el motor intenta pedir "data.data.data", bloqueamos la petición basura
            if (url.includes("data.data")) {
                console.error("Bucle detectado y bloqueado");
                return new Response("", { status: 404 });
            }

            const response = await originalFetch(...args);
            const reader = response.body.getReader();

            return new Response(new ReadableStream({
                start(controller) {
                    function read() {
                        reader.read().then(({done, value}) => {
                            if (done) { controller.close(); return; }
                            
                            totalBytes += value.byteLength;
                            let mb = (totalBytes / (1024 * 1024)).toFixed(2);
                            document.getElementById('mb-count').innerText = mb;

                            // FRENO DE EMERGENCIA
                            if (parseFloat(mb) > MAX_ALLOWED_MB) {
                                document.getElementById('loading-textt').innerHTML = "<span class='danger'>ERROR DE MEMORIA DETECTADO</span>";
                                document.getElementById('status-msg').innerText = "Reiniciando para evitar crash...";
                                location.reload(); // Recarga la página antes de que se trabe la laptop
                                return;
                            }

                            let p = Math.min((totalBytes / 25000000) * 100, 95);
                            document.getElementById('progress-fill').style.width = p + "%";
                            controller.enqueue(value);
                            read();
                        });
                    }
                    read();
                }
            }), { headers: response.headers });
        };
    </script>

    <script src="cfg.js" defer></script>
    <script src="data.js" defer></script>
    <script type="module" src="bundle.js"></script>
</head>

<body>
    <div id="loading-textt">STEAM VERSION - OPTIMIZED</div>
    <div id="progress-container"><div id="progress-fill"></div></div>
    
    <div id="diag">
        <span id="status-msg">Cargando archivos...</span><br>
        Lectura: <span id="mb-count">0.00</span> MB / 22.00 MB
    </div>
</body>
</html>
