<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>Cuphead - Optimized for Chromebook</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #231F20;
            font-family: system-ui, -apple-system, sans-serif;
        }
        #unityContainer {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 32px;
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }
        #progress {
            width: 400px;
            height: 20px;
            background: #333;
            border: 2px solid #fff;
            margin: 20px auto;
            border-radius: 10px;
            overflow: hidden;
        }
        #progressBar {
            height: 100%;
            background: linear-gradient(90deg, #ffcc00, #ff6600);
            width: 0%;
            transition: width 0.3s;
        }
        .info {
            color: #aaa;
            font-size: 18px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div>LOADING CUPHEAD...</div>
        <div id="progress"><div id="progressBar"></div></div>
        <div id="status" class="info">Preparing game (this may take a while on Chromebook)</div>
        <div id="bytes" class="info">0 MB / 2127 MB</div>
    </div>

    <div id="unityContainer"></div>

    <script src="Build/UnityLoader.js"></script>
    <script>
        const loading = document.getElementById('loading');
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('status');
        const bytesText = document.getElementById('bytes');

        let loadedBytes = 0;
        const totalMB = 2127;

        function updateProgress(currentMB) {
            const percent = Math.min(Math.floor((currentMB / totalMB) * 100), 100);
            progressBar.style.width = percent + '%';
            bytesText.textContent = `${currentMB.toFixed(1)} MB / ${totalMB} MB`;
        }

        // Simplified fetch with progress (less memory overhead)
        async function fetchWithProgress(url) {
            const response = await fetch(url);
            const reader = response.body.getReader();
            const contentLength = parseInt(response.headers.get('Content-Length') || '0', 10);
            
            let received = 0;
            const chunks = [];

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                chunks.push(value);
                received += value.length;
                loadedBytes += value.length;

                const mbLoaded = (loadedBytes / (1024 * 1024));
                updateProgress(mbLoaded);
            }

            // Create blob from chunks (more memory efficient than full Uint8Array copy)
            return new Blob(chunks);
        }

        async function mergeParts(baseName, start, end) {
            const parts = [];
            for (let i = start; i <= end; i++) {
                parts.push(`${baseName}.part${i}`);
            }

            const blobs = await Promise.all(parts.map(fetchWithProgress));
            return URL.createObjectURL(new Blob(blobs));
        }

        async function loadGame() {
            try {
                statusText.textContent = "Downloading game files... (Chromebook may feel slow)";

                const [asmUrl, dataUrl, wasmUrl] = await Promise.all([
                    mergeParts("Build/Build.asm.code.unityweb", 1, 3),
                    mergeParts("Build/Build.data.unityweb", 1, 102),
                    mergeParts("Build/Build.wasm.code.unityweb", 1, 2)
                ]);

                const json = {
                    companyName: "SpanishFreddy",
                    productName: "Cuphead",
                    dataUrl: dataUrl,
                    wasmCodeUrl: wasmUrl,
                    wasmFrameworkUrl: "Build.wasm.framework.unityweb",
                    asmCodeUrl: asmUrl,
                    asmMemoryUrl: "Build.asm.memory.unityweb",
                    asmFrameworkUrl: "Build.asm.framework.unityweb",
                    TOTAL_MEMORY: 512 * 1024 * 1024,   // Reduced from 100MB → try 512MB first
                    graphicsAPI: ["WebGL 2.0"],
                    webglContextAttributes: { preserveDrawingBuffer: false },
                    splashScreenStyle: "Dark",
                    backgroundColor: "#231F20"
                };

                statusText.textContent = "Starting Unity WebGL...";

                UnityLoader.instantiate("unityContainer", json, {
                    onProgress: (progress) => {
                        if (progress > 0) {
                            statusText.textContent = `Loading game... ${Math.floor(progress * 100)}%`;
                        }
                    },
                    Module: {
                        onRuntimeInitialized: () => {
                            loading.style.display = 'none';
                            console.log("Cuphead loaded successfully!");
                        }
                    }
                });

            } catch (err) {
                console.error(err);
                statusText.textContent = "Failed to load. Chromebook may not have enough memory.";
                bytesText.textContent = "Try closing other tabs or using a lighter device.";
            }
        }

        // Start loading
        window.addEventListener('load', loadGame);
    </script>
</body>
</html>
