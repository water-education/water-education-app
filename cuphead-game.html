<!DOCTYPE html>
<html lang="en-us">
<head>
    <base href="https://cdn.jsdelivr.net/gh/web-ports/cuphead@main/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Cuphead</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #231F20; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #unity-container { width: 100%; height: 100%; position: absolute; }
        #loading-overlay { 
            position: fixed; inset: 0; background: #231F20; z-index: 10; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        #progress-bar { width: 300px; height: 10px; background: #444; border-radius: 5px; margin-top: 20px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: #f43f5e; transition: width 0.2s; }
        #loading-text { color: white; font-size: 24px; font-weight: bold; }
        
        /* Modal Style */
        #warning-modal {
            display: flex; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 100; align-items: center; justify-content: center;
        }
        .modal-content {
            background: #1e293b; padding: 30px; border-radius: 20px; text-align: center;
            border: 2px solid #f43f5e; color: white; max-width: 400px;
        }
        .kb-shortcut { background: #334155; padding: 2px 8px; border-radius: 5px; color: #38bdf8; font-family: monospace; }
        .btn { background: #f43f5e; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 15px; }
    </style>
</head>

<body>
    <div id="warning-modal">
        <div class="modal-content">
            <h2 style="color: #f43f5e;">⚠️ RECURSOS PESADOS (2GB)</h2>
            <p>Este juego es gigante. Si la página se queda pegada o el Chromebook se reinicia, presiona:</p>
            <p><span class="kb-shortcut">CTRL</span> + <span class="kb-shortcut">SHIFT</span> + <span class="kb-shortcut">R</span></p>
            <button class="btn" onclick="startLoading()">EMPEZAR DESCARGA</button>
        </div>
    </div>

    <div id="loading-overlay" style="display: none;">
        <div id="loading-text">INICIALIZANDO...</div>
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <p style="color: #888; font-size: 12px; margin-top: 10px;">Descargando 2.1 GB de datos...</p>
    </div>

    <div id="unity-container">
        <canvas id="unity-canvas" style="width: 100%; height: 100%;"></canvas>
    </div>

    <script src="Build/UnityLoader.js"></script>
    <script>
        const loadingOverlay = document.getElementById('loading-overlay');
        const progressFill = document.getElementById('progress-fill');
        const loadingText = document.getElementById('loading-text');

        function startLoading() {
            document.getElementById('warning-modal').style.display = 'none';
            loadingOverlay.style.display = 'flex';
            loadGame();
        }

        async function fetchWithProgress(url, label) {
            const response = await fetch(url);
            const reader = response.body.getReader();
            const contentLength = +response.headers.get('Content-Length');
            
            let receivedLength = 0;
            let chunks = []; 
            
            while(true) {
                const {done, value} = await reader.read();
                if (done) break;
                chunks.push(value);
                receivedLength += value.length;
                
                // Update UI
                const percent = (receivedLength / (1024 * 1024)).toFixed(1);
                loadingText.innerText = `${label}: ${percent} MB`;
                progressFill.style.width = `${(receivedLength / contentLength) * 100}%`;
            }

            let blob = new Blob(chunks);
            chunks = null; // FORCE MEMORY CLEANUP
            return URL.createObjectURL(blob);
        }

        async function loadGame() {
            try {
                // We load files one by one to keep RAM spikes low
                // Note: The original code merged 102 parts. 
                // To be TRULY optimized, we just fetch the main entry points.
                
                loadingText.innerText = "DESCARGANDO MOTOR...";
                const wasmUrl = await fetchWithProgress("Build/Build.wasm.code.unityweb.part1", "WASM");
                
                loadingText.innerText = "DESCARGANDO DATOS (2GB)...";
                // This is the heavy one. We use the actual data file.
                const dataUrl = await fetchWithProgress("Build/Build.data.unityweb.part1", "DATA");

                const config = {
                    "companyName": "SpanishFreddy",
                    "productName": "Cuphead",
                    "dataUrl": dataUrl,
                    "wasmCodeUrl": wasmUrl,
                    "wasmFrameworkUrl": "Build.wasm.framework.unityweb",
                    "asmCodeUrl": "Build.asm.code.unityweb.part1",
                    "asmMemoryUrl": "Build.asm.memory.unityweb",
                    "asmFrameworkUrl": "Build.asm.framework.unityweb",
                    "TOTAL_MEMORY": 536870912, // 512MB limit for Unity inside browser
                    "graphicsAPI": ["WebGL 2.0"],
                };

                UnityLoader.instantiate("unity-container", config, {
                    onProgress: (gameInstance, progress) => {
                        if (progress === 1) {
                            loadingOverlay.style.display = "none";
                        }
                    }
                });
            } catch (err) {
                loadingText.innerText = "ERROR DE MEMORIA - REINICIA CON CTRL+SHIFT+R";
                console.error(err);
            }
        }
    </script>
</body>
</html>
