<!DOCTYPE html>
<html lang="en-us">
<head>
    <base href="https://cdn.jsdelivr.net/gh/web-ports/cuphead@main/">
    <meta charset="utf-8">
    <title>Cuphead WebGL</title>

    <style>
        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background: #231F20;
        }
        #unityContainer {
            width: 100%;
            height: 100%;
        }
        #loading-text {
            color: white;
            font-size: 32px;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>

<body>
<div id="loading-text">Loading...</div>
<div id="unityContainer"></div>

<script src="Build/UnityLoader.js"></script>
<script>
    var gameInstance = UnityLoader.instantiate("unityContainer", {
        dataUrl: "Build/Build.data.unityweb",
        frameworkUrl: "Build/Build.wasm.framework.unityweb",
        codeUrl: "Build/Build.wasm.code.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "SpanishFreddy",
        productName: "Cuphead",
        productVersion: "1.0"
    }, {
        onProgress: function(instance, progress) {
            document.getElementById("loading-text").innerText =
                "Loading... " + Math.floor(progress * 100) + "%";
        }
    });
</script>
</body>
</html>
