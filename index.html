<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Unblocked Games</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a2e; color: white; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #00d2ff; margin-bottom: 30px; }
        
        /* The Grid Container */
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; max-width: 1000px; margin: 0 auto; }

        /* The Game Card */
        .game-card { background: #16213e; border-radius: 15px; overflow: hidden; transition: transform 0.3s, box-shadow 0.3s; cursor: pointer; border: 2px solid #0f3460; text-decoration: none; display: block; }
        .game-card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0,210,255,0.3); border-color: #00d2ff; }
        
        .game-img { width: 100%; height: 150px; background: #0f3460; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .game-info { padding: 15px; background: #1a1a2e; }
        .game-title { font-weight: bold; font-size: 18px; color: white; }
    </style>
</head>
<body>

    <h1>Education Portal v2.0</h1>

    <div class="game-grid">
        
        <a href="celeste-game.html" class="game-card">
            <img src="celeste-thumb.jpeg" class="game-img" /> <div class="game-info">
                <div class="game-title">Celeste Classic</div>
            </div>
        </a>

        <div class="game-card" style="opacity: 0.5; cursor: default;">
            <div class="game-img">❓</div>
            <div class="game-info">
                <div class="game-title">Coming Soon...</div>
            </div>
        </div>

    </div>

</body>
</html>
