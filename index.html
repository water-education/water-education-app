<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LA BÓVEDA v2</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#38bdf8;
  --secondary:#a855f7;
  --accent:#22c55e;
  --bg:#020617;
  --card:rgba(15,23,42,0.7);
}

body{
  margin:0;
  font-family:'Outfit',sans-serif;
  background:radial-gradient(circle at top, #0f172a, #020617);
  color:white;
  overflow-x:hidden;
}

/* INTRO */
#welcome{
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

h1{
  font-size:4.5rem;
  font-weight:900;
  background:linear-gradient(to right,var(--primary),var(--secondary));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.enter{
  margin-top:25px;
  padding:18px 40px;
  border:none;
  border-radius:16px;
  font-weight:800;
  font-size:1.2rem;
  cursor:pointer;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  transition:.3s;
}

.enter:hover{
  transform:scale(1.08);
}

/* GRID */
#main{
  display:none;
  padding:40px;
  max-width:1200px;
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
}

.card{
  background:var(--card);
  border-radius:20px;
  overflow:hidden;
  transition:.35s;
  text-decoration:none;
  color:white;
  position:relative;
}

.card:hover{
  transform:translateY(-10px) scale(1.03);
  box-shadow:0 10px 30px rgba(0,0,0,.5);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.info{
  padding:15px;
  font-weight:800;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.85);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  transition:.3s;
  text-align:center;
  padding:15px;
}

.card:hover .overlay{
  opacity:1;
}

/* BOTÓN NUEVO */
#shuffle-btn{
  position:fixed;
  bottom:25px;
  right:25px;
  background:linear-gradient(135deg,#22c55e,#4ade80);
  border:none;
  padding:16px 22px;
  border-radius:50px;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 0 20px rgba(34,197,94,.4);
  transition:.3s;
}

#shuffle-btn:hover{
  transform:scale(1.1) rotate(-5deg);
}

/* MODAL */
#modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-box{
  background:#0f172a;
  padding:30px;
  border-radius:20px;
  text-align:center;
}

</style>
</head>

<body>

<div id="welcome">
  <h1>LA BÓVEDA</h1>
  <p>Acceso limpio, sin tonterías.</p>
  <button class="enter" onclick="start()">Entrar</button>
</div>

<div id="main">
  <div class="grid" id="grid">

    <a href="celeste-game.html" class="card" onclick="warn(event,this.href)">
      <img src="celeste-thumb.jpeg">
      <div class="info">Celeste</div>
      <div class="overlay">Prepárate para morir mucho.</div>
    </a>

    <a href="UNDERTALE.html" class="card">
      <img src="under.png">
      <div class="info">Undertale</div>
      <div class="overlay">Tus decisiones importan.</div>
    </a>

    <a href="cuphead-game.html" class="card">
      <img src="cuphead.png">
      <div class="info">Cuphead</div>
      <div class="overlay">Difícil sin razón.</div>
    </a>

  </div>
</div>

<button id="shuffle-btn" onclick="randomGame()">🎲 Random</button>

<div id="modal">
  <div class="modal-box">
    <h2>Advertencia</h2>
    <p>Este juego puede crashear equipos débiles.</p>
    <button onclick="go()">Continuar</button>
  </div>
</div>

<script>
let nextUrl="";

function start(){
  document.getElementById('welcome').style.display='none';
  document.getElementById('main').style.display='block';
}

function warn(e,url){
  e.preventDefault();
  nextUrl=url;
  document.getElementById('modal').style.display='flex';
}

function go(){
  window.location=nextUrl;
}

function randomGame(){
  const links=document.querySelectorAll('.card');
  const random=links[Math.floor(Math.random()*links.length)];
  random.style.transform='scale(1.1)';
  setTimeout(()=>{
    window.location=random.href;
  },400);
}

</script>

</body>
</html>
