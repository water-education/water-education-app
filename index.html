<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA BÓVEDA v1.5 - CYBER EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --dark-bg: #050505;
            --card-inner: #0a0a0f;
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* Animated Scanline Overlay */
        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 999;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        /* --- WELCOME SCREEN --- */
        #welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            transition: 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .cyber-title {
            font-size: 6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 15px;
            margin: 0;
            background: linear-gradient(to bottom, #fff 40%, var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(0, 243, 255, 0.5));
        }

        .glitch-sub {
            color: var(--neon-purple);
            letter-spacing: 5px;
            font-weight: 300;
            margin-bottom: 40px;
        }

        .enter-btn {
            background: transparent;
            color: var(--neon-blue);
            border: 2px solid var(--neon-blue);
            padding: 20px 60px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            cursor: pointer;
            position: relative;
            transition: 0.3s;
            overflow: hidden;
        }

        .enter-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 50px var(--neon-blue);
        }

        /* --- GAME GRID --- */
        #game-section {
            display: none;
            width: 90%;
            max-width: 1400px;
            padding: 80px 0;
        }

        .category-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .cat-btn {
            background: #111;
            border: 1px solid #333;
            color: #888;
            padding: 10px 25px;
            border-radius: 0;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .cat-btn.active {
            border-color: var(--neon-purple);
            color: var(--neon-purple);
            box-shadow: inset 0 0 10px var(--neon-purple);
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
        }

        .game-card {
            background: var(--card-inner);
            border: 1px solid #222;
            position: relative;
            text-decoration: none;
            overflow: hidden;
            transition: 0.4s;
            opacity: 0;
            transform: translateY(30px);
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 2px;
            background: var(--neon-blue);
            transition: 0.5s;
        }

        .game-card:hover {
            border-color: var(--neon-blue);
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
        }

        .game-card:hover::before { left: 0; }

        .game-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            filter: grayscale(80%);
            transition: 0.4s;
        }

        .game-card:hover .game-img { filter: grayscale(0%); }

        .game-info {
            padding: 20px;
            border-top: 1px solid #222;
        }

        .game-title {
            color: #fff;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .description-overlay {
            position: absolute;
            bottom: -100%;
            left: 0;
            width: 100%;
            background: var(--neon-blue);
            color: #000;
            padding: 15px;
            font-weight: 700;
            transition: 0.3s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .game-card:hover .description-overlay { bottom: 0; }

        /* --- ANIMATIONS --- */
        .show-content { display: block !important; }
        
        @keyframes cardFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Warning Modal */
        #warning-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            border: 1px solid var(--neon-purple);
            padding: 40px;
            text-align: center;
            max-width: 400px;
            background: #000;
        }

        .troll-btn {
            position: fixed;
            bottom: 20px; right: 20px;
            background: #000;
            border: 1px solid gold;
            color: gold;
            padding: 10px;
            cursor: pointer;
            font-size: 0.7rem;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="warning-modal">
        <div class="modal-content">
            <h2 style="color: var(--neon-purple);">SYSTEM NOTICE</h2>
            <p>RAM usage optimization required for Celeste. Press <br><strong>CTRL+SHIFT+R</strong><br> during load.</p>
            <button onclick="proceedToGame()" class="enter-btn" style="padding: 10px 20px; font-size: 0.8rem; margin-top: 20px;">BYPASS</button>
        </div>
    </div>

    <div class="troll-btn" onmouseover="trollMe(this)">[!] 0 ROBUX DETECTED</div>

    <div id="welcome-screen">
        <h1 class="cyber-title">BÓVEDA</h1>
        <div class="glitch-sub">ENCRYPTED_ACCESS // v1.5</div>
        <button class="enter-btn" onclick="openVault()">Enter System</button>
    </div>

    <div id="game-section">
        <div class="category-bar">
            <button class="cat-btn active" onclick="filterGames('all', this)">All_Files</button>
            <button class="cat-btn" onclick="filterGames('platformer', this)">Movement</button>
            <button class="cat-btn" onclick="filterGames('action', this)">Combat</button>
            <button class="cat-btn" onclick="filterGames('extra', this)">Misc</button>
        </div>
        
        <div class="game-grid" id="main-grid">
            <a href="celeste-game.html" class="game-card" data-cat="platformer" onclick="return checkCeleste(event, this.href)">
                <img src="celeste-thumb.jpeg" class="game-img" />
                <div class="game-info"><div class="game-title">Celeste Classic</div></div>
                <div class="description-overlay">STAY DETERMINED.</div>
            </a>

            <a href="Meatboy.html" class="game-card" data-cat="platformer">
                <img src="meat.jpeg" class="game-img" />
                <div class="game-info"><div class="game-title">Super Meat Boy</div></div>
                <div class="description-overlay">PRECISION_REQD.</div>
            </a>

            <a href="isaac.html" class="game-card" data-cat="action">
                <img src="350.png" class="game-img" />
                <div class="game-info"><div class="game-title">The Binding of Isaac</div></div>
                <div class="description-overlay">CRY_HARDER.</div>
            </a>

            <a href="cookie.html" class="game-card" data-cat="extra">
                <img src="82.png" class="game-img" />
                <div class="game-info"><div class="game-title">Cookie Clicker</div></div>
                <div class="description-overlay">CLICK_LOOP_START.</div>
            </a>
            
            </div>
    </div>

    <script>
        let pendingUrl = "";
        function checkCeleste(e, url) {
            e.preventDefault();
            pendingUrl = url;
            document.getElementById('warning-modal').style.display = 'flex';
            return false;
        }

        function proceedToGame() {
            window.location.href = pendingUrl;
        }

        function openVault() {
            const welcome = document.getElementById('welcome-screen');
            welcome.style.opacity = '0';
            welcome.style.transform = 'scale(1.2)';

            setTimeout(() => {
                welcome.style.display = 'none';
                const section = document.getElementById('game-section');
                section.classList.add('show-content');
                animateCards();
            }, 800);
        }

        function animateCards() {
            const cards = document.querySelectorAll('.game-card');
            cards.forEach((card, index) => {
                if(card.style.display !== 'none') {
                    setTimeout(() => {
                        card.style.animation = 'cardFadeIn 0.5s forwards';
                    }, index * 100);
                }
            });
        }

        function filterGames(category, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const cards = document.querySelectorAll('.game-card');
            cards.forEach(card => {
                card.style.opacity = '0';
                card.style.animation = 'none';
                if (category === 'all' || card.getAttribute('data-cat') === category) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
            animateCards();
        }

        function trollMe(btn) {
            btn.style.top = Math.random() * 90 + "%";
            btn.style.left = Math.random() * 90 + "%";
            btn.innerText = "ACCESS_DENIED";
        }
    </script>
</body>
</html>
