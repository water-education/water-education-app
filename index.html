<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault | Unblocked</title>
    <style>
        /* Darker, High-Contrast Theme */
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: #050a14; /* Very dark midnight blue */
            color: #e2e8f0; 
            margin: 0; 
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* 1. WELCOME SECTION */
        #welcome-screen {
            text-align: center;
            transition: opacity 0.6s ease, transform 0.6s ease;
            position: absolute;
            z-index: 10;
        }

        #welcome-screen h1 {
            font-size: 3.5rem;
            color: #00d2ff;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        #welcome-screen p {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 30px;
            max-width: 500px;
        }

        .enter-btn {
            background: linear-gradient(45deg, #00d2ff, #3a86ff);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
        }

        .enter-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.7);
        }

        /* 2. GAMES SECTION (Hidden by default) */
        #game-section {
            display: none; /* Starts hidden */
            opacity: 0;
            width: 100%;
            max-width: 1200px;
            padding: 40px 20px;
            text-align: center;
        }

        .game-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 30px; 
            margin-top: 40px;
        }

        /* The Game Card */
        .game-card { 
            background: #0f172a; 
            border-radius: 20px; 
            overflow: hidden; 
            position: relative; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 1px solid #1e293b;
            text-decoration: none; 
            display: block; 
        }

        .game-card:hover { 
            transform: translateY(-10px); 
            border-color: #00d2ff;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.2);
        }

        .game-img { width: 100%; height: 180px; object-fit: cover; display: block; }

        .game-info { padding: 15px; background: #0f172a; }

        .game-title { font-weight: 800; font-size: 1.1rem; color: #f8fafc; }

        /* Hover Overlay */
        .description-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 210, 255, 0.85);
            color: #050a14;
            display: flex; align-items: center; justify-content: center;
            padding: 20px; box-sizing: border-box;
            opacity: 0; transition: 0.3s;
            font-weight: 600; text-align: center;
        }

        .game-card:hover .description-overlay { opacity: 1; }

        /* Utility Class to Show/Hide */
        .fade-out { opacity: 0; transform: scale(0.9); pointer-events: none; }
        .fade-in { display: block !important; opacity: 1 !important; transition: 1s ease; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1>THE VAULT</h1>
        <p>Your private portal for academic "research" and high-performance simulations.</p>
        <button class="enter-btn" onclick="showGames()">GAMES</button>
    </div>

    <div id="game-section">
        <h2 style="color: #00d2ff; font-size: 2rem;">Game Library</h2>
        
        <div class="game-grid">
            
            <a href="celeste-game.html" class="game-card">
                <img src="celeste-thumb.jpeg" class="game-img" />
                <div class="game-info">
                    <div class="game-title">Celeste Classic</div>
                </div>
                <div class="description-overlay">Precision platforming at its finest. Reach the summit.</div>
            </a>

            <a href="buckshot-roulette-game.html" class="game-card">
                <img src="buckshot.jpeg" class="game-img" />
                <div class="game-info">
                    <div class="game-title">Buckshot Roulette</div>
                </div>
                <div class="description-overlay">A gritty game of strategy and nerves.</div>
            </a>

        </div>
    </div>

    <script>
        function showGames() {
            // Hide the welcome screen
            const welcome = document.getElementById('welcome-screen');
            welcome.classList.add('fade-out');

            // Show the game section after a short delay for animation
            setTimeout(() => {
                welcome.style.display = 'none';
                const games = document.getElementById('game-section');
                games.classList.add('fade-in');
                // Change body to allow scrolling once games appear
                document.body.style.display = 'block';
            }, 600);
        }
    </script>

</body>
</html>
